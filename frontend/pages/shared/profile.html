<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hồ sơ cá nhân | HT_LMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .profile-container { max-width: 900px; margin: 2rem auto; display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
    @media (max-width: 768px) { .profile-container { grid-template-columns: 1fr; } }
    
    .profile-card {
        background: var(--dark-surface); border: 1px solid var(--dark-border); border-radius: 20px; padding: 2rem;
        position: sticky; top: 2rem;
    }
    .profile-avatar-big {
        width: 120px; height: 120px; border-radius: 30px; margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, var(--primary), #818cf8);
        display: grid; place-items: center; font-size: 3rem; font-weight: 800; color: white;
        box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
    }
    .profile-name { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
    .profile-role-badge { 
        text-align: center; display: block; margin: 0 auto 1.5rem; width: fit-content;
        padding: .25rem .75rem; border-radius: 20px; background: rgba(37, 99, 235, 0.1);
        color: var(--primary); font-size: .85rem; font-weight: 600;
    }
    .info-list { margin-top: 2rem; border-top: 1px solid var(--dark-border); padding-top: 1.5rem; }
    .info-item { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: .95rem; }
    .info-label { color: var(--dark-muted); }

    .main-form-card { background: var(--dark-surface); border: 1px solid var(--dark-border); border-radius: 20px; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: .75rem; }
    .section-title i { color: var(--primary); }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; margin-bottom: .5rem; font-size: .875rem; color: var(--dark-muted); font-weight: 500; }
    .form-control {
        width: 100%; padding: .85rem 1.1rem; border-radius: 12px;
        background: var(--dark-bg); border: 1px solid var(--dark-border);
        color: var(--dark-text); font-family: inherit; transition: all .2s ease;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); outline: none; }
    .form-control:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .btn-save { 
        width: 100%; padding: 1rem; border-radius: 12px; background: var(--primary); 
        color: white; font-weight: 600; font-size: 1rem; margin-top: 1rem;
        transition: transform .2s ease, filter .2s ease;
    }
    .btn-save:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-save:active { transform: translateY(0); }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="main-content" style="margin-left:0; width:100%">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:1rem">
        <button class="btn-icon" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
        <div class="topbar-title">Hồ sơ cá nhân</div>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" id="themeToggle"><i class="bi bi-sun"></i></button>
      </div>
    </div>

    <div class="page-content">
      <div class="profile-container">
        <!-- Sidebar Card -->
        <div class="profile-card">
          <div class="profile-avatar-big" id="avatarBig">?</div>
          <h1 class="profile-name" id="nameDisplay">Cargando...</h1>
          <span class="profile-role-badge" id="roleDisplay">Vai trò</span>
          
          <div class="info-list">
            <div class="info-item">
              <span class="info-label">Mã tài khoản</span>
              <span id="maDisplay">—</span>
            </div>
            <div class="info-item">
              <span class="info-label">Tham gia từ</span>
              <span id="dateDisplay">—</span>
            </div>
          </div>
        </div>

        <!-- Main Form Area -->
        <div class="main-form-area">
          <div class="main-form-card" style="margin-bottom:2rem">
            <h2 class="section-title"><i class="bi bi-person-circle"></i> Thông tin cơ bản</h2>
            <form id="profileForm">
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">Họ tên</label>
                  <input type="text" class="form-control" id="fullName" disabled>
                </div>
                <div class="form-group">
                  <label class="form-label">Tên đăng nhập</label>
                  <input type="text" class="form-control" id="usernm" disabled>
                </div>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Số điện thoại</label>
                  <input type="text" class="form-control" id="phone">
                </div>
              </div>
              <button type="submit" class="btn-save" id="btnSaveInfo">Cập nhật hồ sơ</button>
            </form>
          </div>

          <div class="main-form-card">
            <h2 class="section-title"><i class="bi bi-shield-lock"></i> Đổi mật khẩu</h2>
            <form id="passwordForm">
              <div class="form-group">
                <label class="form-label">Mật khẩu hiện tại</label>
                <input type="password" class="form-control" id="oldPass" required>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">Mật khẩu mới</label>
                  <input type="password" class="form-control" id="newPass" required placeholder="Tối thiểu 8 ký tự">
                </div>
                <div class="form-group">
                  <label class="form-label">Xác nhận mật khẩu</label>
                  <input type="password" class="form-control" id="confirmPass" required>
                </div>
              </div>
              <button type="submit" class="btn-save" id="btnSavePass" style="background:var(--dark-border); color:var(--dark-text)">Đổi mật khẩu</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
if (!api.isLoggedIn()) location.href = '../auth/login.html';

async function initPage() {
    try {
        const userInfo = api.getUserInfo();
        const loai = api.getLoaiTaiKhoan();
        
        // Populate initial data from storage
        document.getElementById('nameDisplay').textContent = userInfo.ho_so?.ho_ten || 'User';
        document.getElementById('avatarBig').textContent = LMSUtils.getInitials(userInfo.ho_so?.ho_ten || 'User');
        document.getElementById('roleDisplay').textContent = api.getLoaiTaiKhoan() === 'NhanVien' ? (userInfo.vai_tro_codes?.[0] || 'Nhân viên') : loai;
        document.getElementById('maDisplay').textContent = userInfo.ma_tai_khoan;
        document.getElementById('usernm').value = userInfo.ten_dang_nhap || '***';
        document.getElementById('fullName').value = userInfo.ho_so?.ho_ten || '';
        
        // Fetch fresh details from API (profile endpoint I added)
        const res = await api.get('/api/auth/toi'); // Or specialized profile endpoint
        if (res.data) {
            // Some profiles need specific endpoint per role for full details
            let detailRes;
            if (loai === 'NguoiHoc') detailRes = await api.get(`/api/users/nguoi-hoc/${userInfo.ma_tai_khoan}`);
            else if (loai === 'GiangVien') detailRes = await api.get(`/api/users/giang-vien/${userInfo.ma_tai_khoan}`); // Need to implement this detail endpoint
            
            if (detailRes?.data) {
                document.getElementById('email').value = detailRes.data.Email || '';
                document.getElementById('phone').value = detailRes.data.SoDienThoai || '';
                if (detailRes.data.NgayTao) document.getElementById('dateDisplay').textContent = new Date(detailRes.data.NgayTao).toLocaleDateString('vi-VN');
            }
        }
    } catch (err) {
        console.error(err);
    }
}

document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSaveInfo');
    const data = {
        email: document.getElementById('email').value,
        so_dien_thoai: document.getElementById('phone').value
    };
    
    try {
        btn.disabled = true; btn.textContent = 'Đang lưu...';
        const loai = api.getLoaiTaiKhoan();
        const id = api.getUserInfo().ma_tai_khoan;
        
        let res;
        if (loai === 'NguoiHoc') res = await api.updateNguoiHoc(id, data);
        else if (loai === 'GiangVien') res = await api.updateGiangVien(id, data);
        else res = await api.updateNhanVien(id, data);
        
        Toast.show('Cập nhật hồ sơ thành công', 'success');
    } catch (err) {
        Toast.show(err.message || 'Lỗi khi cập nhật', 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Cập nhật hồ sơ';
    }
});

document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const oldP = document.getElementById('oldPass').value;
    const newP = document.getElementById('newPass').value;
    const confP = document.getElementById('confirmPass').value;
    
    if (newP !== confP) {
        Toast.show('Mật khẩu xác nhận không khớp', 'error');
        return;
    }
    
    try {
        const btn = document.getElementById('btnSavePass');
        btn.disabled = true; btn.textContent = 'Đang xử lý...';
        
        await api.doiMatKhau(oldP, newP);
        Toast.show('Đổi mật khẩu thành công', 'success');
        document.getElementById('passwordForm').reset();
    } catch (err) {
        Toast.show(err.message || 'Lỗi khi đổi mật khẩu', 'error');
    } finally {
        const btn = document.getElementById('btnSavePass');
        btn.disabled = false; btn.textContent = 'Đ đổi mật khẩu';
    }
});

initPage();
</script>
</body>
</html>
