<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quản lý Nhân viên | HT_LMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<div class="app-wrapper">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:grid;place-items:center">
        <i class="bi bi-mortarboard-fill" style="color:#fff;font-size:1.1rem"></i>
      </div>
      <span>HT_LMS</span>
    </div>
    <nav class="sidebar-nav">
      <p class="nav-section-title">Tổng quan</p>
      <a class="nav-item" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <p class="nav-section-title">Quản lý người dùng</p>
      <a class="nav-item" href="nguoi-hoc.html"><i class="bi bi-person-badge"></i> Người học</a>
      <a class="nav-item" href="giang-vien.html"><i class="bi bi-person-workspace"></i> Giảng viên</a>
      <a class="nav-item active" href="nhan-vien.html"><i class="bi bi-person-gear"></i> Nhân viên</a>
      <p class="nav-section-title">Cơ cấu tổ chức</p>
      <a class="nav-item" href="khoa.html"><i class="bi bi-building"></i> Khoa / Bộ môn</a>
      <a class="nav-item" href="nganh.html"><i class="bi bi-diagram-3"></i> Ngành / Lớp HC</a>
      <p class="nav-section-title">Học vụ</p>
      <a class="nav-item" href="hoc-ky.html"><i class="bi bi-calendar3"></i> Học kỳ</a>
      <a class="nav-item" href="lop-hoc-phan.html"><i class="bi bi-collection"></i> Lớp học phần</a>
      <p class="nav-section-title">Hệ thống</p>
      <a class="nav-item" href="../shared/profile.html"><i class="bi bi-person-circle"></i> Hồ sơ cá nhân</a>
      <a class="nav-item" href="nhat-ky.html"><i class="bi bi-journal-text"></i> Nhật ký hệ thống</a>
      <a class="nav-item" href="bao-cao.html"><i class="bi bi-bar-chart-line"></i> Báo cáo</a>
    </nav>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <button class="btn-icon sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
      <div class="topbar-title">Quản lý Nhân viên</div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="card-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
          <h2 class="card-title">Danh sách Nhân viên</h2>
          <div style="display:flex; gap:.5rem;">
            <input type="text" id="searchInput" class="form-control" style="width:250px" placeholder="Tìm kiếm Họ tên, Chức vụ...">
            <button class="btn btn-primary" onclick="loadData()"><i class="bi bi-search"></i></button>
            <a href="edit.html?type=nhanvien" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Thêm mới</a>
          </div>
        </div>
        <div class="table-responsive">
          <table class="lms-table">
            <thead>
              <tr>
                <th>Họ Tên</th>
                <th>Tài khoản</th>
                <th>Chức vụ</th>
                <th>Trạng thái</th>
                <th style="text-align:right">Thao tác</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
async function loadData() {
  const keyword = document.getElementById('searchInput').value;
  try {
    const res = await api.getNhanVien({ tu_khoa: keyword });
    const data = res.data || [];
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.map(item => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:.6rem">
              <div class="avatar avatar-sm">${LMSUtils.getInitials(item.HoTen)}</div>
              <strong>${item.HoTen}</strong>
            </div>
          </td>
          <td>
            <div style="font-size:.85rem">${item.Email || '—'}</div>
            <div style="font-size:.75rem; color:var(--dark-muted)">TK: ${item.TenDangNhap}</div>
          </td>
          <td>${item.ChucVu || '—'}</td>
          <td>${LMSUtils.badgeByTrangThai(item.TrangThai)}</td>
          <td style="text-align:right">
            <a href="edit.html?type=nhanvien&id=${item.MaTKNhanVien}" class="btn-icon"><i class="bi bi-pencil" style="color:var(--primary)"></i></a>
            <button class="btn-icon" title="${item.TrangThai === 'HoatDong' ? 'Khoá' : 'Mở khoá'}" onclick="toggleLock(${item.MaTKNhanVien}, '${item.TrangThai}')">
              <i class="bi bi-${item.TrangThai === 'HoatDong' ? 'lock' : 'unlock'}" style="color:var(--dark-muted)"></i>
            </button>
            <button class="btn-icon" onclick="deleteUser(${item.MaTKNhanVien})"><i class="bi bi-trash" style="color:#ef4444"></i></button>
          </td>
        </tr>
    `).join('');
  } catch(err) { Toast.show('Lỗi tải dữ liệu', 'error'); }
}

async function toggleLock(id, current) {
    try {
        await api.updateNhanVien(id, { trang_thai: current === 'HoatDong' ? 'Khoa' : 'HoatDong' });
        Toast.show('Thành công', 'success');
        loadData();
    } catch(err) { Toast.show(err.message, 'error'); }
}

async function deleteUser(id) {
    if (!confirm('Xóa vĩnh viễn tài khoản này?')) return;
    try { await api.deleteNhanVien(id); loadData(); } catch(err) { Toast.show(err.message, 'error'); }
}

$('#sidebarToggle').click(() => $('#sidebar').toggleClass('open'));
loadData();
</script>
</body>
</html>
