            { id: 'ma_hoc_phan_code', label: 'Mã học phần (Code)', type: 'text', required: true },

            { id: 'ho_ten', label: 'Họ và tên', type: 'text', required: true, half: true },
            { id: 'email', label: 'Email', type: 'email', required: true, half: true },
            { id: 'so_dien_thoai', label: 'Số điện thoại', type: 'text', half: true },
            { id: 'ma_bo_mon', label: 'Bộ môn công tác', type: 'select', options: 'bomon', required: true, half: true },
            { id: 'hoc_vi', label: 'Học vị', type: 'text', placeholder: 'VD: Thạc sĩ, Tiến sĩ', half: true },
            { id: 'hoc_ham', label: 'Học hàm', type: 'text', placeholder: 'VD: Phó giáo sư', half: true }

            { id: 'ten_dang_nhap', label: 'Tên đăng nhập', type: 'text', required: !id, half: true },

async function init() {
    if (!type || !CONFIG[type]) {
        Toast.show('Loại dữ liệu không hợp lệ', 'error');
        return;
    }

    const userInfo = api.getUserInfo();
    const maTruong = userInfo?.ma_truong;

    const config = CONFIG[type];
    $('#pageTitle').text((id ? 'Cập nhật ' : 'Thêm mới ') + config.title);
    
    // Render fields
    let html = '';
    let inGrid = false;

    for (const f of config.fields) {
        if (f.half && !inGrid) { html += '<div class="field-grid">'; inGrid = true; }
        else if (!f.half && inGrid) { html += '</div>'; inGrid = false; }

        html += `<div class="form-group">
            <label class="form-label">${f.label}${f.required ? ' *' : ''}</label>`;
        
        if (f.type === 'textarea') {
            html += `<textarea class="form-control" id="${f.id}" rows="4" ${f.required?'required':''}></textarea>`;
        } else if (f.type === 'select') {
            html += `<select class="form-control" id="${f.id}" ${f.required?'required':''}></select>`;
        } else {
            html += `<input type="${f.type}" class="form-control" id="${f.id}" ${f.required?'required':''} step="${f.step||''}" placeholder="${f.placeholder||''}" value="${f.value||''}">`;
        }
        html += `</div>`;
    }
    if (inGrid) html += '</div>';
    $('#dynamicFields').html(html);

    // Load Select Options
    for (const f of config.fields) {
        if (f.type === 'select') {
            const select = $(`#${f.id}`);
            if (f.values) {
                select.html(f.values.map(v => `<option value="${v.v}">${v.t}</option>`).join(''));
            } else if (f.options) {
                await loadSelectOptions(select, f.options, maTruong);
            }
        }
    }

    // Load Data if Edit
    if (id) {
        try {
            const res = await config.fetchDetail(id);
            const item = res.data;
            if (item) {
                config.fields.forEach(f => {
                    // Map backend keys to form ids
                    let val = item[f.id] || item[snakeToPascal(f.id)];
                    // Special mappings for nested or mixed case
                    if (f.id === 'ma_bo_mon') val = item.MaBoMon;
                    if (f.id === 'ma_khoa') val = item.MaKhoa;
                    if (f.id === 'ma_nganh') val = item.MaNganh;
                    if (f.id === 'ma_lop_hc') val = item.MaLopHC;
                    if (f.id === 'ma_hoc_phan') val = item.MaHocPhan;
                    if (f.id === 'ma_hoc_ky') val = item.MaHocKy;
                    if (f.id === 'ma_giang_vien') val = item.MaGiangVien || item.MaHoSoGV;
                    if (f.id === 'ma_nhan_vien') val = item.MaNhanVien || item.MaHoSoNV;
                    if (f.id === 'ma_ky_hieu') val = item.MaKyHieu;
                    if (f.id === 'ten_dang_nhap') val = item.TenDangNhap;
                    if (f.id === 'ten_lop_hp') val = item.TenLop;
                    if (f.id === 'ma_lop_hp_code') val = item.MaLopHPCode;
                    
                    if (f.type === 'date' && val) val = val.split('T')[0];
                    if (f.type === 'password') val = ''; // Never show password
                    $(`#${f.id}`).val(val);
                });
            }
        } catch(e) { Toast.show('Lỗi tải dữ liệu chi tiết', 'error'); }
    }

    $('#loading').hide();
    $('#formContainer').fadeIn();
}

async function loadSelectOptions(select, optionType, maTruong) {
    try {
        let res;
        if (optionType === 'khoa') res = await api.getKhoa(maTruong);
        if (optionType === 'bomon') res = await api.getBoMon();
        if (optionType === 'nganh') res = await api.getNganh();
        if (optionType === 'lophc') res = await api.getLopHanhChinh({ ma_truong: maTruong });
        if (optionType === 'hocky') res = await api.getHocKy();
        if (optionType === 'hocphan') res = await api.getHocPhan();
        if (optionType === 'giangvien') res = await api.getGiangVien({ ma_truong: maTruong });

        if (res && res.data) {
            let html = '<option value="">-- Chọn --</option>';
            html += res.data.map(it => {
                const pid = it.MaKhoa || it.MaBoMon || it.MaNganh || it.MaLopHC || it.MaHocKy || it.MaHocPhan || it.MaHoSoGV || it.MaTaiKhoanGV || it.MaHoSoNV || it.MaTaiKhoanNV;
                const name = it.TenKhoa || it.TenBoMon || it.TenNganh || it.TenLop || it.TenHocKy || it.TenHocPhan || it.HoTen;
                return `<option value="${pid}">${name}</option>`;
            }).join('');
            select.html(html);
        }
    } catch(e) { console.error(e); }
}

function snakeToPascal(str) {
    return str.split('_').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
}

$('#mainForm').submit(async (e) => {
    e.preventDefault();
    const config = CONFIG[type];
    const data = {};
    config.fields.forEach(f => {
        data[f.id] = $(`#${f.id}`).val();
    });

    try {
        $('#btnSubmit').prop('disabled', true).html('<span class="spinner"></span> Đang lưu...');
        if (id) {
            await config.update(id, data);
        } else {
            await config.create(data);
        }
        Toast.show('Lưu thành công', 'success');
        setTimeout(() => history.back(), 1000);
    } catch(err) {
        Toast.show(err.message || 'Lỗi lưu dữ liệu', 'error');
        $('#btnSubmit').prop('disabled', false).text('Lưu thay đổi');
    }
});

$('#sidebarToggle').click(() => $('#sidebar').toggleClass('open'));
init();
</script>
